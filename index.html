<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reminder Guru</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">

  <header class="bg-gradient-to-r from-blue-900 to-blue-700 text-white py-8 shadow-lg">
    <div class="max-w-6xl mx-auto px-6">
      <h1 class="text-4xl font-bold tracking-wide">REMINDER GURU</h1>
      <p class="mt-2 text-blue-100">Dashboard pengingat kegiatan sekolah</p>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-10">
    <div id="reminderContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Data reminder muncul di sini -->
    </div>
  </main>

  <script>
    const API_URL = "https://opensheet.elk.sh/1LWHkjnO6BZ-QC9CjxEStDiqklgQ_ZYSFoVgLtokf3PM/ReminderGuru";

    async function loadReminders() {
      const container = document.getElementById("reminderContainer");
      container.innerHTML = "<p class='text-gray-600'>Memuat data reminder...</p>";

      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error("Gagal mengambil data");

        const data = await response.json();
        const grouped = {};

        data.forEach(item => {
          const bulan = item.Bulan?.trim();
          const reminder = item.Reminder?.trim();

          if (!bulan || !reminder) return;

          if (!grouped[bulan]) {
            grouped[bulan] = [];
          }

          grouped[bulan].push(reminder);
        });

        container.innerHTML = "";

        Object.keys(grouped).forEach(bulan => {
          const card = document.createElement("div");
          card.className = "bg-white rounded-2xl shadow-md border border-blue-100 p-6 hover:shadow-xl transition";

          const title = document.createElement("h2");
          title.className = "text-2xl font-bold text-blue-900 mb-4";
          title.textContent = bulan.toUpperCase();

          const list = document.createElement("ol");
          list.className = "list-decimal list-inside space-y-2 text-gray-700";

          grouped[bulan].forEach(text => {
            const li = document.createElement("li");
            li.textContent = text;
            list.appendChild(li);
          });

          card.appendChild(title);
          card.appendChild(list);
          container.appendChild(card);
        });

      } catch (error) {
        console.error(error);
        container.innerHTML = "<p class='text-red-600'>Gagal memuat data. Periksa kembali Google Sheet Anda.</p>";
      }
    }

    loadReminders();
  </script>

</body>
</html>
