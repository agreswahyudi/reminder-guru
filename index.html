<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reminder Guru</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen">

  <header class="bg-gradient-to-r from-blue-900 to-blue-700 text-white py-8 shadow-lg">
    <div class="max-w-6xl mx-auto px-6">
      <h1 class="text-4xl font-bold tracking-wide">REMINDER GURU</h1>
      <p class="mt-2 text-blue-100">Dashboard pengingat kegiatan sekolah</p>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-10">
    <div id="reminderContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <p class="text-gray-600">Memuat data reminder...</p>
    </div>
  </main>

  <script>
    const API_URL = "https://opensheet.elk.sh/1LWHkjnO6BZ-QC9CjxEStDiqklgQ_ZYSFoVgLtokf3PM/ReminderGuru";

    async function loadReminders() {
      const container = document.getElementById("reminderContainer");

      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error("Gagal mengambil data");

        const data = await response.json();

        const grouped = {};

        data.forEach(item => {
          const bulan = item.Bulan?.trim();
          const kategori = item.Kategori?.trim();
          const tanggal = item.Tanggal?.trim();
          const reminder = item.Reminder?.trim();

          if (!bulan || !kategori || !reminder) return;

          if (!grouped[bulan]) {
            grouped[bulan] = {
              Penting: [],
              Deadline: []
            };
          }

          grouped[bulan][kategori].push({
            tanggal,
            reminder
          });
        });

        container.innerHTML = "";

        Object.keys(grouped).forEach(bulan => {
          const card = document.createElement("div");
          card.className = "bg-white rounded-2xl shadow-md border border-blue-100 p-6 hover:shadow-xl transition";

          const title = document.createElement("h2");
          title.className = "text-2xl font-bold text-blue-900 mb-4";
          title.textContent = bulan.toUpperCase();

          // ===== INFORMASI PENTING =====
          const pentingTitle = document.createElement("h3");
          pentingTitle.className = "font-semibold text-blue-700";
          pentingTitle.textContent = "📌 Informasi Penting";

          const pentingList = document.createElement("ul");
          pentingList.className = "mt-2 space-y-1 text-gray-700";

          grouped[bulan].Penting.forEach(item => {
            const li = document.createElement("li");
            li.textContent = `${item.tanggal} : ${item.reminder}`;
            pentingList.appendChild(li);
          });

          // ===== DEADLINE =====
          const deadlineTitle = document.createElement("h3");
          deadlineTitle.className = "font-semibold text-red-600 mt-4";
          deadlineTitle.textContent = "⏰ Deadline";

          const deadlineList = document.createElement("ul");
          deadlineList.className = "mt-2 space-y-2";

          grouped[bulan].Deadline.forEach(item => {
            const li = document.createElement("li");
            li.className = "flex items-center gap-2";

            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.className = "w-4 h-4";

            const text = document.createElement("span");
            text.textContent = `${item.tanggal} : ${item.reminder}`;

            // EVENT CHECKLIST
            checkbox.addEventListener("change", () => {
              text.classList.toggle("line-through");
              text.classList.toggle("text-gray-400");
            });

            li.appendChild(checkbox);
            li.appendChild(text);
            deadlineList.appendChild(li);
          });

          // APPEND
          card.appendChild(title);
          card.appendChild(pentingTitle);
          card.appendChild(pentingList);
          card.appendChild(deadlineTitle);
          card.appendChild(deadlineList);

          container.appendChild(card);
        });

      } catch (error) {
        console.error(error);
        container.innerHTML = "<p class='text-red-600'>Gagal memuat data. Periksa Google Sheet Anda.</p>";
      }
    }

    loadReminders();
  </script>

</body>
</html>
